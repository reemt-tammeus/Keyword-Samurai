<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AP Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header id="stats-bar" class="hidden">
            <div id="progress">1 / 5</div>
            <div id="lives">❤️❤️❤️</div>
            <div id="streak-display">🔥 <span id="streak-count">0</span></div>
        </header>

        <main id="content-area">
            <section data-screen="menu" class="blueprint-screen active">
                <div class="glass-box" id="menu-box">
                    <h2 id="menu-title">Keyword Transformation</h2>
                    <p style="margin-bottom: 20px; font-size: 0.9rem;">AP English Drill</p>
                    <button class="action-btn" onclick="startBlock()">START DRILL</button>
                    <div class="branding-note">created by Mr. T. and Master E.</div>
                </div>
            </section>

            <section data-screen="playing" class="blueprint-screen">
                <div id="playing-glass-box" class="glass-box">
                    <div id="task-orig" class="task-text"></div>
                    <div id="task-key" class="keyword-box"></div>
                    <div class="input-area">
                        <span id="task-pre"></span>
                        <span id="user-input-display" class="typing-placeholder">...</span>
                        <span id="task-suf"></span>
                    </div>
                </div>
            </section>

            <section data-screen="continue" class="blueprint-screen">
                <div class="glass-box">
                    <h2>Block geschafft! 🎯</h2>
                    <p style="margin-bottom: 20px;">Dein Streak: 🔥 <span id="final-streak"></span></p>
                    <button class="action-btn" onclick="startBlock()">NÄCHSTE 5 (SHUFFLE)</button>
                    <button class="action-btn secondary" onclick="AppDirector.goBack()">BEENDEN</button>
                </div>
            </section>
        </main>

        <footer id="thumb-zone" class="hidden">
            <div id="keyboard"></div>
        </footer>
    </div>

    <div id="feedback-flash" class="hidden"></div>
    
    <div id="game-over-screen" class="hidden">
        <img src="loser.jpg" alt="Game Over">
    </div>

    <canvas id="blueprint-fireworks" class="blueprint-fireworks-canvas"></canvas>

    <script src="app.js"></script>
</body>
</html>
